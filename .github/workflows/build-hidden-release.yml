name: Build Hidden Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload APK to (leave empty to skip release upload)'
        required: false
        type: string
        default: ''
      ref:
        description: 'Git ref to checkout (leave empty for default branch)'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag to upload APK to (leave empty to skip release upload)'
        required: false
        type: string
        default: ''
      ref:
        description: 'Git ref to checkout (leave empty for default branch)'
        required: false
        type: string
        default: ''
    secrets:
      KEYSTORE_BASE64:
        required: true
      KEYSTORE_PASSWORD:
        required: true
      KEY_ALIAS:
        required: true
      KEY_PASSWORD:
        required: true

permissions:
  contents: write

jobs:
  build-hidden-release:
    name: Build Hidden Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION_NAME}"

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/keystore.jks

      - name: Build signed hidden release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleHiddenRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace

      - name: Rename APK
        id: rename
        run: |
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          APK_NAME="jarngreipr-${VERSION_NAME}h.apk"
          mv app/build/outputs/apk/hidden/release/app-hidden-release.apk app/build/outputs/apk/hidden/release/${APK_NAME}
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "Renamed APK to: ${APK_NAME}"

      - name: Upload APK to Release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: app/build/outputs/apk/hidden/release/${{ steps.rename.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarngreipr-${{ steps.version.outputs.version_name }}h
          path: app/build/outputs/apk/hidden/release/${{ steps.rename.outputs.apk_name }}

      - name: Cleanup keystore
        if: always()
        run: rm -f ${{ github.workspace }}/keystore.jks

      - name: Notify Discord of hidden release
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_PUBLIC_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.version_name }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${RELEASE_TAG}"
          PATCH_NOTES=$(cat app/src/main/res/raw/patch_notes.md)

          DESC=$(printf "A new hidden release is available.\n\n%s\n\n[View Release](%s)" "$PATCH_NOTES" "$RELEASE_URL")

          PAYLOAD=$(jq -n \
            --arg title "🥷 Járngreipr v${VERSION} (Hidden) is now available!" \
            --arg desc "$DESC" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: 7419530,
                footer: { text: "Járngreipr Hidden Release" }
              }]
            }')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "${DISCORD_WEBHOOK_URL}"
