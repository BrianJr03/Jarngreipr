name: Build Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new GitHub release?'
        required: true
        type: boolean
        default: true
      release_tag:
        description: 'Release tag (e.g., v1.7.3) - used for new release or existing release to attach to'
        required: true
        type: string
      release_name:
        description: 'Release name (only used if creating new release)'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        type: boolean
        default: false
      build_hidden:
        description: 'Also build hidden release APK?'
        required: false
        type: boolean
        default: true

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION_NAME}"

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/keystore.jks

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace

      - name: Rename APK
        id: rename
        run: |
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          APK_NAME="jarngreipr-${VERSION_NAME}.apk"
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/${APK_NAME}
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "Renamed APK to: ${APK_NAME}"

      - name: Create Release and Upload APK
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name || inputs.release_tag }}
          prerelease: ${{ inputs.prerelease }}
          body_path: app/src/main/res/raw/patch_notes.md
          files: app/build/outputs/apk/release/${{ steps.rename.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Existing Release
        if: ${{ !inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: app/build/outputs/apk/release/${{ steps.rename.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/${{ steps.rename.outputs.apk_name }}

      - name: Cleanup keystore
        if: always()
        run: rm -f ${{ github.workspace }}/keystore.jks

  build-hidden:
    name: Build Hidden Release APK
    needs: build-release
    if: ${{ inputs.build_hidden }}
    uses: ./.github/workflows/build-hidden-release.yml
    with:
      release_tag: ${{ inputs.release_tag }}
    secrets:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
