name: Build Release

on:
  push:
    branches:
      - dev  # Early access build on push to dev — only when versionName changes
    paths:
      - 'app/build.gradle.kts'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a new GitHub release?'
        required: true
        type: boolean
        default: true
      release_tag:
        description: 'Release tag (e.g., v1.7.3) - used for new release or existing release to attach to'
        required: true
        type: string
      release_name:
        description: 'Release name (only used if creating new release)'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        type: boolean
        default: false
      build_hidden:
        description: 'Also build hidden release APK?'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  version-check:
    name: Check versionName Change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to compare versionName

      - name: Check if versionName changed
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — skipping version check."
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Allow skipping version check via commit message flag
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qi '\[skip-version-check\]'; then
            echo "Found [skip-version-check] in commit message — forcing build."
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PREVIOUS=$(git show HEAD~1:app/build.gradle.kts 2>/dev/null | grep 'versionName' | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "")
          echo "Current versionName:  $CURRENT"
          echo "Previous versionName: $PREVIOUS"
          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "versionName unchanged ($CURRENT) — skipping build."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "versionName bumped: $PREVIOUS → $CURRENT"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  build-release:
    name: Build Release APK
    needs: version-check
    if: needs.version-check.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION_NAME}"

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/keystore.jks

      - name: Build signed standard release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleStandardRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace

      - name: Rename APK
        id: rename
        run: |
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          APK_NAME="jarngreipr-${VERSION_NAME}.apk"
          mv app/build/outputs/apk/standard/release/app-standard-release.apk app/build/outputs/apk/standard/release/${APK_NAME}
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "Renamed APK to: ${APK_NAME}"

      # --- Manual release flow (workflow_dispatch) ---

      - name: Create Release and Upload APK
        if: github.event_name == 'workflow_dispatch' && inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name || inputs.release_tag }}
          prerelease: ${{ inputs.prerelease }}
          body_path: app/src/main/res/raw/patch_notes.md
          files: app/build/outputs/apk/standard/release/${{ steps.rename.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Existing Release
        if: github.event_name == 'workflow_dispatch' && !inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: app/build/outputs/apk/standard/release/${{ steps.rename.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact (backup)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/standard/release/${{ steps.rename.outputs.apk_name }}

      - name: Notify Discord of manual release
        if: github.event_name == 'workflow_dispatch' && inputs.create_release
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_PUBLIC_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.version_name }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${RELEASE_TAG}"
          PATCH_NOTES=$(cat app/src/main/res/raw/patch_notes.md)

          DESC=$(printf "A new release is available.\n\n%s\n\n[View Release](%s)" "$PATCH_NOTES" "$RELEASE_URL")

          PAYLOAD=$(jq -n \
            --arg title "🚀 Járngreipr v${VERSION} is now available!" \
            --arg desc "$DESC" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: 5763719,
                footer: { text: "Járngreipr Release" }
              }]
            }')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "${DISCORD_WEBHOOK_URL}"

      # --- Early access flow (push to dev) ---

      - name: Upload early access APK artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: jarngreipr-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/apk/standard/release/${{ steps.rename.outputs.apk_name }}
          retention-days: 90

      - name: Post to Discord early-builds
        if: github.event_name == 'push'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUPPORTER_ROLE_ID: ${{ secrets.SUPPORTER_ROLE_ID }}
          VERSION: ${{ steps.version.outputs.version_name }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          ARTIFACT_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          PATCH_NOTES=$(cat app/src/main/res/raw/patch_notes.md)

          DESC=$(printf "A new build is ready for early access supporters!\n\n%s\n\n**[⬇️ Download APKs](%s)** (normal + hidden)\n\n*Public release drops in 3 days.*" "$PATCH_NOTES" "$ARTIFACT_URL")

          PAYLOAD=$(jq -n \
            --arg content "<@&${SUPPORTER_ROLE_ID}>" \
            --arg title "🧤 Járngreipr Early Build — v${VERSION}" \
            --arg desc "$DESC" \
            '{
              content: $content,
              embeds: [{
                title: $title,
                description: $desc,
                color: 7419530,
                footer: { text: "Járngreipr Early Access" }
              }]
            }')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "${DISCORD_WEBHOOK_URL}"

      - name: Tag early access build
        if: github.event_name == 'push'
        run: |
          TAG="early/v${{ steps.version.outputs.version_name }}"
          git tag "$TAG" "${{ github.sha }}"
          git push origin "$TAG"

      - name: Cleanup keystore
        if: always()
        run: rm -f ${{ github.workspace }}/keystore.jks

  build-hidden:
    name: Build Hidden Release APK
    needs: [version-check, build-release]
    if: needs.version-check.outputs.changed == 'true' && ((github.event_name == 'workflow_dispatch' && inputs.build_hidden) || github.event_name == 'push')
    uses: ./.github/workflows/build-hidden-release.yml
    with:
      release_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
    secrets:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
